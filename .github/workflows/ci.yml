name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: protocol conformance (spec == package == vectors)
        run: npm test
      - name: CLI ceremony regression (9th-audit — the seven points cannot regress)
        run: npm run test:cli
