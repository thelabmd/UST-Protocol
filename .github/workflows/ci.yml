name: CI
on:
  push:
    branches: [main]
  pull_request:

# least-privilege GITHUB_TOKEN at the workflow level (OpenSSF Token-Permissions): CI only reads the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # third-party actions pinned to a full commit SHA (OpenSSF Pinned-Dependencies) — a moved tag cannot alter CI.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
      - run: npm install
      - name: protocol conformance + language-neutral arc contract (spec == package == vectors)
        run: npm test
      - name: reference checker TCB — byte-vector corpus + coverage manifest (regenerate == committed) + JS asserts + robustness fuzz
        run: npm run test:byte-vectors && npm run test:reference-checker && npm run test:reference-checker-fuzz
      - name: bounded-exhaustive model check — per-rule induction step (total/deterministic/contract-gated) + exhaustive single-mutation soundness
        run: npm run test:bmc
      - name: model <-> code guard (every formal theorem is a real conformance check)
        run: npm run test:model
      - name: model-lockstep guard (every enforcement realization cites an ADVERSARIAL-closure check, not just the happy path)
        run: npm run test:model-lockstep
      - name: language-neutral vectors in sync with the reference impl (regenerate == committed)
        run: npm run test:vectors
      - name: spec <-> code registry sync (canonical string sets — spec == REGISTRY == code)
        run: npm run test:spec-sync
      - name: capability parity (every surface's stance matches the spec's capability set — no silent lag, UST-3dj class)
        run: npm run test:parity
      - name: CLI ceremony regression (9th-audit — the seven points cannot regress)
        run: npm run test:cli
      - name: ust-lite is a valid UST subset (byte-identical to the reference impl, both directions)
        run: npm run test:lite
      - name: security regression (external-audit P0/P1 reproductions must stay closed — epic UST-1o6)
        run: npm run test:security
      - name: SSRF guards (core + MCP)
        run: npm run test:ssrf
      - name: connector receipts (OTS + Rekor)
        run: npm run test:connectors
      - name: web-signer cross-verification
        run: npm run test:web-signer
      - name: MCP live stdio transport (CWD-independent)
        run: npm run test:mcp-live
      - name: dependency audit — no critical advisories in the SHIPPED (production) tree (P1-08)
        run: npm run test:audit
      - name: npm-drift gate (a published version is immutable)
        run: node tools/npm-drift-check.mjs
      - name: CHANGELOG rev-ladder gate (a checker rev bump records itself)
        run: npm run test:changelog
