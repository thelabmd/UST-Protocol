name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: protocol conformance + language-neutral arc contract (spec == package == vectors)
        run: npm test
      - name: model <-> code guard (every formal theorem is a real conformance check)
        run: npm run test:model
      - name: language-neutral vectors in sync with the reference impl (regenerate == committed)
        run: npm run test:vectors
      - name: spec <-> code registry sync (canonical string sets — spec == REGISTRY == code)
        run: npm run test:spec-sync
      - name: CLI ceremony regression (9th-audit — the seven points cannot regress)
        run: npm run test:cli
      - name: ust-lite is a valid UST subset (byte-identical to the reference impl, both directions)
        run: npm run test:lite
      - name: security regression (external-audit P0/P1 reproductions must stay closed — epic UST-1o6)
        run: npm run test:security
      - name: SSRF guards (core + MCP)
        run: npm run test:ssrf
      - name: connector receipts (OTS + Rekor)
        run: npm run test:connectors
      - name: web-signer cross-verification
        run: npm run test:web-signer
      - name: MCP live stdio transport (CWD-independent)
        run: npm run test:mcp-live
      - name: dependency audit — no critical advisories in the non-optional tree (P1-08)
        run: npm run test:audit
      - name: npm-drift gate (a published version is immutable)
        run: node tools/npm-drift-check.mjs
