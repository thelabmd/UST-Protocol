<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 515" role="img" aria-label="A TRANSCRIPT — SELF-CONTAINED, VERIFIES ANYWHERE">
<title>A TRANSCRIPT — SELF-CONTAINED, VERIFIES ANYWHERE</title>
<g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="15" xml:space="preserve">
  <rect x="1.5" y="1.5" width="877" height="512" rx="10" fill="#0d1117" stroke="#3d444d" stroke-width="1.5"/>
  <line x1="16" y1="46" x2="864" y2="46" stroke="#30363d" stroke-width="1"/>
  <text x="28" y="34" fill="#58a6ff" font-size="13" font-weight="600" letter-spacing="2">A TRANSCRIPT — SELF-CONTAINED, VERIFIES ANYWHERE</text>
  <text x="36" y="71" fill="#c9d1da" font-size="14">{</text>
  <text x="52.86" y="96" fill="#79c0ff" font-size="14">"ust"</text>
  <text x="95.00999999999999" y="96" fill="#8b949e" font-size="14">: </text>
  <text x="111.86999999999999" y="96" fill="#7ee787" font-size="14">"1.0",</text>
  <text x="502" y="96" fill="#58a6ff" >←</text>
  <text x="520" y="96" fill="#8b949e" font-size="13">wire format — stable across all rc’s</text>
  <text x="52.86" y="121" fill="#79c0ff" font-size="14">"state"</text>
  <text x="111.87" y="121" fill="#8b949e" font-size="14">: </text>
  <text x="128.73000000000002" y="121" fill="#c9d1da" font-size="14">{</text>
  <text x="69.72" y="146" fill="#79c0ff" font-size="14">"id"</text>
  <text x="103.44" y="146" fill="#8b949e" font-size="14">: </text>
  <text x="120.3" y="146" fill="#c9d1da" font-size="14">{</text>
  <text x="86.58" y="171" fill="#79c0ff" font-size="14">"domain_shard"</text>
  <text x="204.6" y="171" fill="#8b949e" font-size="14">: </text>
  <text x="221.45999999999998" y="171" fill="#7ee787" font-size="14">"example.org",</text>
  <text x="502" y="171" fill="#58a6ff" >←</text>
  <text x="520" y="171" fill="#8b949e" font-size="13">WHO — a name, or a self-certifying key-id</text>
  <text x="86.58" y="196" fill="#79c0ff" font-size="14">"ust_id"</text>
  <text x="154.01999999999998" y="196" fill="#8b949e" font-size="14">: </text>
  <text x="170.88" y="196" fill="#7ee787" font-size="14">"ust:20260710.1429",</text>
  <text x="502" y="196" fill="#58a6ff" >←</text>
  <text x="520" y="196" fill="#8b949e" font-size="13">WHEN — an address on one shared UTC axis</text>
  <text x="86.58" y="221" fill="#79c0ff" font-size="14">"key_id"</text>
  <text x="154.01999999999998" y="221" fill="#8b949e" font-size="14">: </text>
  <text x="170.88" y="221" fill="#7ee787" font-size="14">"sha256:…", "class": "observation"</text>
  <text x="69.72" y="246" fill="#c9d1da" font-size="14">},</text>
  <text x="69.72" y="271" fill="#79c0ff" font-size="14">"time"</text>
  <text x="120.3" y="271" fill="#8b949e" font-size="14">: </text>
  <text x="137.16" y="271" fill="#c9d1da" font-size="14">{ generated_at · valid_from · valid_to },</text>
  <text x="502" y="271" fill="#58a6ff" >←</text>
  <text x="520" y="271" fill="#8b949e" font-size="13">the claimed frame</text>
  <text x="69.72" y="296" fill="#79c0ff" font-size="14">"data"</text>
  <text x="120.3" y="296" fill="#8b949e" font-size="14">: </text>
  <text x="137.16" y="296" fill="#c9d1da" font-size="14">{ … partitions … },</text>
  <text x="502" y="296" fill="#58a6ff" >←</text>
  <text x="520" y="296" fill="#8b949e" font-size="13">captured / computed / blinded / encrypted</text>
  <text x="69.72" y="321" fill="#79c0ff" font-size="14">"hashes"</text>
  <text x="137.16" y="321" fill="#8b949e" font-size="14">: </text>
  <text x="154.01999999999998" y="321" fill="#c9d1da" font-size="14">{ one per partition },</text>
  <text x="502" y="321" fill="#58a6ff" >←</text>
  <text x="520" y="321" fill="#8b949e" font-size="13">domain-separated — bind data to id + frame</text>
  <text x="69.72" y="346" fill="#79c0ff" font-size="14">"provenance"</text>
  <text x="170.88" y="346" fill="#8b949e" font-size="14">: </text>
  <text x="187.74" y="346" fill="#c9d1da" font-size="14">{ based_on[] · prev · seed }</text>
  <text x="502" y="346" fill="#58a6ff" >←</text>
  <text x="520" y="346" fill="#8b949e" font-size="13">lineage — chains, streams, derivations</text>
  <text x="52.86" y="371" fill="#c9d1da" font-size="14">},</text>
  <text x="52.86" y="396" fill="#79c0ff" font-size="14">"sig"</text>
  <text x="95.00999999999999" y="396" fill="#8b949e" font-size="14">: </text>
  <text x="111.86999999999999" y="396" fill="#c9d1da" font-size="14">{ "alg": "Ed25519", key_id · pub · sig }</text>
  <text x="502" y="396" fill="#58a6ff" >←</text>
  <text x="520" y="396" fill="#8b949e" font-size="13">travels WITH the data — not with the channel</text>
  <text x="36" y="421" fill="#c9d1da" font-size="14">}</text>
  <line x1="16" y1="435" x2="864" y2="435" stroke="#30363d" stroke-width="1"/>
  <text x="36" y="465" fill="#3fb950" font-weight="600">SEAL at creation</text>
  <text x="196" y="465" fill="#8b949e" >──▶</text>
  <text x="244" y="465" fill="#79c0ff" font-weight="600">STORE anywhere</text>
  <text x="388" y="465" fill="#8b949e" >──▶</text>
  <text x="436" y="465" fill="#c9d1da" font-weight="600">VERIFY offline — one call · no blockchain</text>
  <text x="36" y="489" fill="#8b949e" font-size="13">TLS secures the pipe — UST secures the payload: cache, mirror, file or chat paste — the same verdict</text>
</g>
</svg>
